<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Soccer: Mobile Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
        }
        
        body { 
            background: #0d0d0d; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
            padding: 10px;
        }
        
        .panel { 
            background: rgba(15, 15, 15, 0.98); 
            border: 3px solid #00ff66; 
            border-radius: 16px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); 
            max-width: 500px; 
            width: 95%; 
            display: none; 
            z-index: 20; 
        }
        .active { display: block; }
        
        h1 { color: #00ff66; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; text-shadow: 0 0 10px rgba(0,255,102,0.3); }
        h2 { font-size: 15px; margin-bottom: 15px; color: #ddd; }
        
        input { padding: 12px; font-size: 16px; text-align: center; border-radius: 6px; border: 2px solid #444; background: #222; color: #fff; margin-bottom: 15px; width: 90%; text-transform: uppercase; }
        .btn { background: #00ff66; color: #000; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 6px 0; transition: all 0.2s ease; text-transform: uppercase; width: 90%; }
        .btn:active { background: #fff; transform: scale(0.98); }
        .btn-secondary { background: #333; color: #fff; border: 2px solid #555; }
        .btn-audio { background: #ff9900; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; max-height: 180px; overflow-y: auto; padding-right: 5px; }
        .team-btn { background: #222; color: white; border: 2px solid #444; padding: 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .team-btn.selected { border-color: #00ff66; background: #111; box-shadow: 0 0 10px rgba(0,255,102,0.5); }
        
        #rooms-list-container { max-height: 200px; overflow-y: auto; margin-bottom: 15px; text-align: left; padding: 5px; }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1020px;
        }

        canvas { 
            background: #1a1a1a; 
            border: 4px solid #333; 
            border-radius: 0 0 12px 12px; 
            display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            width: 100%;
            height: auto;
            max-height: 55vh; 
            aspect-ratio: 1020 / 620;
        }

        #hud { 
            display: none; 
            width: 100%; 
            justify-content: space-between; 
            background: #050505; 
            padding: 10px 20px; 
            border-radius: 12px 12px 0 0; 
            border: 4px solid #333; 
            border-bottom: none; 
            font-size: 18px; 
            font-weight: bold; 
            font-family: 'Courier New', monospace; 
        }
        .score-box { display: flex; align-items: center; gap: 10px; }
        
        #player-list { text-align: left; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; max-height: 140px; overflow-y: auto; }
        #player-list li { list-style: none; padding: 5px 0; border-bottom: 1px solid #444; font-size: 14px; }
        
        #penalty-alert { position: absolute; font-size: 28px; color: #ff3333; font-weight: bold; text-transform: uppercase; display: none; text-shadow: 0 0 15px #ff0000; text-align: center; z-index: 40; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; border: 2px solid #ff3333; width: 80%; }

        /* CONTROLES MOBILE SEMPRE VISÍVEIS NO JOGO */
        #mobile-controls { 
            display: none; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 160px; 
            pointer-events: none; 
            z-index: 30; 
            padding-bottom: env(safe-area-inset-bottom); 
        }
        
        #joystick-container { 
            position: absolute; 
            bottom: 20px; 
            left: 25px; 
            width: 110px; 
            height: 110px; 
            background: rgba(255, 255, 255, 0.1); 
            border: 3px solid rgba(255, 255, 255, 0.3); 
            border-radius: 50%; 
            pointer-events: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        
        #joystick-handle { 
            width: 45px; 
            height: 45px; 
            background: rgba(0, 255, 102, 0.6); 
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%; 
            position: absolute; 
            left: 30px;  top: 30px; 
        }
        
        #kick-btn { 
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            width: 95px; 
            height: 95px; 
            background: rgba(255, 51, 51, 0.7); 
            border: 4px solid rgba(255, 255, 255, 0.6); 
            border-radius: 50%; 
            pointer-events: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 16px; 
            color: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .grid::-webkit-scrollbar, #player-list::-webkit-scrollbar, #rooms-list-container::-webkit-scrollbar { width: 4px; }
        .grid::-webkit-scrollbar-thumb, #player-list::-webkit-scrollbar-thumb, #rooms-list-container::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="penalty-alert">DISPUTA DE PÊNALTIS!<br><span style="font-size:15px; color:#fff">Série de 5 cobranças alternadas</span></div>

    <div id="menu" class="panel active">
        <h1>Pro Soccer: Cup</h1>
        <h2>Escolha o Modo de Jogo</h2>
        <button class="btn" onclick="setLocalMode(2)">Local: 1 vs 1</button>
        <button class="btn" onclick="setLocalMode(4)">Local: 2 vs 2</button>
        <button class="btn btn-secondary" onclick="showPanel('multiplayer-menu')">🌐 Multijogador Online</button>
        <hr style="border-color: #333; margin: 12px 0;">
        <button class="btn btn-audio" id="audio-toggle-btn" onclick="toggleAudio()">🔊 Áudio: Desligado</button>
    </div>

    <div id="multiplayer-menu" class="panel">
        <h1>Salas Online</h1>
        <button class="btn" onclick="startOnlineCreateFlow()">Criar Nova Sala</button>
        <button class="btn btn-secondary" style="border-color: #00ff66; color: #00ff66;" onclick="fetchAvailableRooms()">🔍 Buscar Salas Abertas</button>
        <hr style="border-color: #333; margin: 12px 0;">
        <input type="text" id="room-code-input" placeholder="DIGITAR CÓDIGO MANUAL" maxlength="6">
        <button class="btn" onclick="startOnlineJoinFlow()">Entrar Direto</button>
        <button class="btn btn-secondary" onclick="showPanel('menu')">Voltar</button>
    </div>

    <div id="rooms-list-menu" class="panel">
        <h1>Salas Disponíveis</h1>
        <h2>Selecione uma partida com vagas abertas:</h2>
        <div id="rooms-list-container"></div>
        <button class="btn btn-secondary" onclick="showPanel('multiplayer-menu')">Voltar</button>
    </div>

    <div id="lobby-panel" class="panel">
        <h1>SALA: <span id="display-room-code" style="color: #00ff66;"></span></h1>
        <h2>Jogadores na Sala (Máximo 5)</h2>
        <ul id="player-list"></ul>
        <button id="start-online-btn" class="btn" onclick="startOnlineGame()" style="display:none;">Iniciar Partida</button>
        <button class="btn btn-secondary" onclick="leaveRoom()">Sair da Sala</button>
    </div>

    <div id="char-select" class="panel">
        <h1>Escolha sua Seleção</h1>
        <div id="select-turn" style="margin-bottom: 12px; font-weight: bold; color: #00ff66; font-size:14px;"></div>
        <div class="grid" id="teams-grid"></div>
    </div>

    <div id="game-container">
        <div id="hud">
            <div class="score-box"><span id="name-t1">TIME A</span> <span id="score-t1" style="color:#00ff66">0</span></div>
            <div style="color: #fff;" id="game-timer">02:00</div>
            <div class="score-box"><span id="score-t2" style="color:#ff3333">0</span> <span id="name-t2">TIME B</span></div>
        </div>
        <canvas id="gameCanvas" width="1020" height="620"></canvas>
    </div>

    <div id="mobile-controls">
        <div id="joystick-container"><div id="joystick-handle"></div></div>
        <div id="kick-btn">CHUTE</div>
    </div>

    <script>
        // ==========================================
        // 1. GERENCIADOR DE ÁUDIO
        // ==========================================
        let audioEnabled = false;
        let currentBGM = null;
        
        const bgmTracks = [
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', 
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', 
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
        ];

        const sfxTracks = {
            sfx2_chute_forte: 'https://actions.google.com/sounds/v1/impacts/crash.ogg',
            sfx5_trave: 'https://actions.google.com/sounds/v1/impacts/metal_clang.ogg',
            sfx6_rede: 'https://actions.google.com/sounds/v1/foley/cloth_flap.ogg',
            sfx7_apito_inicio: 'https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg',
            sfx8_apito_fim: 'https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg',
            sfx13_defesa: 'https://actions.google.com/sounds/v1/impacts/wood_hit.ogg',
            sfx14_torcida_gol: 'https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg',
            sfx20_click_menu: 'https://actions.google.com/sounds/v1/ui/button_click.ogg',
            sfx21_select: 'https://actions.google.com/sounds/v1/ui/button_click.ogg',
            sfx30_tempo_esgotando: 'https://actions.google.com/sounds/v1/alarms/mechanical_clock_tick.ogg',
            sfx38_fogos: 'https://actions.google.com/sounds/v1/explosions/fireworks.ogg'
        };

        const audioObjects = {}; 
        
        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audio-toggle-btn').innerText = audioEnabled ? "🔊 Áudio: Ligado" : "🔈 Áudio: Desligado";
            if (audioEnabled) playMusic(0); 
            else if (currentBGM) { currentBGM.pause(); }
            playSound('sfx20_click_menu');
        }

        function playMusic(index) {
            if (!audioEnabled || !bgmTracks[index]) return;
            if (currentBGM) currentBGM.pause();
            currentBGM = new Audio(bgmTracks[index]);
            currentBGM.loop = true;
            currentBGM.volume = 0.3;
            currentBGM.play().catch(e => {});
        }

        function playSound(key) {
            if (!audioEnabled || !sfxTracks[key]) return;
            if (!audioObjects[key]) audioObjects[key] = new Audio(sfxTracks[key]);
            let soundClone = audioObjects[key].cloneNode();
            soundClone.volume = 0.6;
            soundClone.play().catch(e => {});
        }

        // ==========================================
        // 2. CONFIGURAÇÃO FIREBASE E DO JOGO
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCHw9gH8El6UKSEgG8zorVraL5zWeTLSQM",
            authDomain: "mmmmm-6cd19.firebaseapp.com",
            databaseURL: "https://mmmmm-6cd19-default-rtdb.firebaseio.com",
            projectId: "mmmmm-6cd19",
            storageBucket: "mmmmm-6cd19.firebasestorage.app",
            messagingSenderId: "371990311720",
            appId: "1:371990311720:web:63e3747f3239834c58561d",
            measurementId: "G-C492EPGKBE"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TEAMS = {
            'Alemanha': { main: '#ffffff', sub: '#000000', text: '#000' },
            'Brasil': { main: '#ccff00', sub: '#0052b4', text: '#000' },
            'Argentina': { main: '#74acdf', sub: '#ffffff', text: '#000' },
            'França': { main: '#002395', sub: '#ffffff', text: '#fff' },
            'Inglaterra': { main: '#ffffff', sub: '#ce1126', text: '#000' },
            'Holanda': { main: '#f36c21', sub: '#000000', text: '#000' },
            'Canadá': { main: '#ff0000', sub: '#ffffff', text: '#fff' },
            'China': { main: '#ee1c25', sub: '#ffff00', text: '#fff' },
            'Dinamarca': { main: '#c60c30', sub: '#ffffff', text: '#fff' },
            'Escócia': { main: '#005eb8', sub: '#ffffff', text: '#fff' },
            'Estados Unidos da América': { main: '#002868', sub: '#bf0a30', text: '#fff' }
        };

        let isOnline = false, isHost = false, myRoomId = null;
        let myPlayerId = "plr_" + Math.floor(Math.random() * 10000);
        let onlinePlayers = {}, onlineAction = null, targetRoomCode = null;
        
        let localPlayerX = 0, localPlayerY = 0;
        let lastTotalScore = 0, networkTick = 0;

        let gameMode = 2; 
        let selectedTeam1 = "Brasil", selectedTeam2 = "Alemanha";
        let pickingStage = 1, score = { team1: 0, team2: 0 };
        let gameInterval, timerInterval, gameTime = 90;
        let players = [], goalkeepers = [], ball = null, crowdFans = []; 

        let isPenaltyMode = false, penaltyTurn = 1, penaltyKicksCount = 0;
        let joystick = { x: 0, y: 0, active: false }, isMobileKicking = false;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function showPanel(id) {
            playSound('sfx20_click_menu');
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // ==========================================
        // 3. EVENTOS TOUCH ADAPTADOS COM MULTI-TOUCH
        // ==========================================
        const jContainer = document.getElementById('joystick-container');
        const jHandle = document.getElementById('joystick-handle');
        const kBtn = document.getElementById('kick-btn');

        jContainer.addEventListener('touchstart', (e) => { joystick.active = true; moveJoystick(e); }, {passive:false});
        window.addEventListener('touchmove', (e) => { if(joystick.active) moveJoystick(e); }, {passive:false});
        
        window.addEventListener('touchend', (e) => {
            // Verifica se o toque do analógico ainda existe nas listas ativos
            let hasJoystickTouch = false;
            for(let i=0; i<e.touches.length; i++) {
                if(e.touches[i].target === jContainer || jContainer.contains(e.touches[i].target)) {
                    hasJoystickTouch = true;
                }
            }
            if(!hasJoystickTouch) {
                joystick.active = false; joystick.x = 0; joystick.y = 0;
                jHandle.style.left = '30px'; jHandle.style.top = '30px';
            }
        });
        
        kBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isMobileKicking = true; });
        kBtn.addEventListener('touchend', (e) => { e.preventDefault(); isMobileKicking = false; });

        function moveJoystick(e) {
            const touch = Array.from(e.touches).find(t => t.target === jContainer || jContainer.contains(t.target));
            if(!touch) return;

            const rect = jContainer.getBoundingClientRect();
            const cx = rect.left + rect.width/2; const cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx; let dy = touch.clientY - cy;
            const dist = Math.min(rect.width/2, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);

            joystick.x = (Math.cos(angle) * dist) / (rect.width/2);
            joystick.y = (Math.sin(angle) * dist) / (rect.height/2);
            jHandle.style.left = `${(rect.width/2) + Math.cos(angle)*dist - 22}px`;
            jHandle.style.top = `${(rect.height/2) + Math.sin(angle)*dist - 22}px`;
        }

        const keysPressed = {};
        window.addEventListener('keydown', e => { keysPressed[e.code] = true; });
        window.addEventListener('keyup', e => { keysPressed[e.code] = false; });

        // ==========================================
        // 4. MULTIPLAYER: LÓGICA DE SALAS E BUSCA
        // ==========================================
        function startOnlineCreateFlow() { onlineAction = 'create'; isOnline = true; showPanel('char-select'); renderTeamsMenu(); }
        
        function startOnlineJoinFlow() {
            const code = document.getElementById('room-code-input').value.toUpperCase();
            if(code.length < 5) return alert("Código Inválido.");
            connectToTargetRoom(code);
        }

        function fetchAvailableRooms() {
            showPanel('rooms-list-menu');
            const container = document.getElementById('rooms-list-container');
            container.innerHTML = '<p style="color:#00ff66; text-align:center; padding:20px;">Buscando partidas abertas...</p>';
            
            db.ref('rooms').once('value', snap => {
                container.innerHTML = '';
                const rooms = snap.val();
                if(!rooms) {
                    container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">Nenhuma sala ativa encontrada.</p>';
                    return;
                }
                
                let foundOpenRooms = false;
                Object.keys(rooms).forEach(code => {
                    const room = rooms[code];
                    if(room.status === 'waiting') {
                        foundOpenRooms = true;
                        const count = Object.keys(room.players || {}).length;
                        
                        let card = document.createElement('div');
                        card.style.cssText = "background:#1a1a1a; border:2px solid #333; padding:12px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;";
                        
                        let info = document.createElement('div');
                        info.innerHTML = `<span style="font-size:16px; font-weight:bold; color:#fff;">Sala: <span style="color:#00ff66;">${code}</span></span><br><span style="font-size:12px; color:#aaa;">Vagas: ${count}/5 Jogadores</span>`;
                        
                        let joinBtn = document.createElement('button');
                        joinBtn.className = 'btn';
                        joinBtn.style.cssText = "width:auto; padding:8px 16px; margin:0; font-size:13px; background:#00ff66; color:#000;";
                        joinBtn.innerText = "ENTRAR";
                        joinBtn.onclick = () => {
                            if(count >= 5) return alert("Esta sala lotou!");
                            connectToTargetRoom(code);
                        };
                        
                        card.appendChild(info);
                        card.appendChild(joinBtn);
                        container.appendChild(card);
                    }
                });
                
                if(!foundOpenRooms) {
                    container.innerHTML = '<p style="color:#ff3333; text-align:center; padding:20px;">Todas as salas estão cheias ou em jogo no momento.</p>';
                }
            });
        }

        function connectToTargetRoom(code) {
            db.ref('rooms/' + code).once('value', snap => {
                if(snap.exists()) {
                    const data = snap.val();
                    if(Object.keys(data.players || {}).length >= 5) return alert("Sala lotada.");
                    if(data.status === 'playing') return alert("Partida em andamento.");
                    
                    onlineAction = 'join'; targetRoomCode = code; isOnline = true;
                    showPanel('char-select'); renderTeamsMenu();
                } else { alert("Sala não encontrada."); }
            });
        }

        function executeCreateRoom(team) {
            myRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            isHost = true; localPlayerX = 250; localPlayerY = 310;

            db.ref('rooms/' + myRoomId).set({
                status: 'waiting',
                players: { [myPlayerId]: { name: "Host (P1)", team: team, x: localPlayerX, y: localPlayerY, isKick: false } },
                ball: { x: 510, y: 310, vx: 0, vy: 0 },
                goalkeepers: { gk1: { x: 65, y: 310 }, gk2: { x: 955, y: 310 } },
                score: { team1: 0, team2: 0 },
                timer: 90
            }).then(() => {
                document.getElementById('display-room-code').innerText = myRoomId;
                showPanel('lobby-panel'); listenToRoom();
            });
        }

        function executeJoinRoom(code, team) {
            myRoomId = code; isHost = false;

            db.ref(`rooms/${code}/players`).once('value', snap => {
                const currentPlayers = snap.val() || {};
                const count = Object.keys(currentPlayers).length;
                const spawnPositions = [ {x: 770, y: 310}, {x: 720, y: 180}, {x: 720, y: 440} ];
                let selectedSpawn = spawnPositions[(count - 1) % spawnPositions.length] || {x: 770, y: 310};
                localPlayerX = selectedSpawn.x; localPlayerY = selectedSpawn.y;

                db.ref(`rooms/${myRoomId}/players/${myPlayerId}`).set({
                    name: `Jogador ${count + 1}`, team: team, x: localPlayerX, y: localPlayerY, isKick: false
                }).then(() => {
                    document.getElementById('display-room-code').innerText = myRoomId;
                    showPanel('lobby-panel'); listenToRoom();
                });
            });
        }

        function listenToRoom() {
            db.ref(`rooms/${myRoomId}/status`).on('value', snap => {
                const status = snap.val();
                if(!status) return;
                if(status === 'ended') return finishGame();
                if(status === 'playing' && canvas.style.display !== 'block') initGameEngine(true);
            });

            db.ref(`rooms/${myRoomId}/players`).on('value', snap => {
                const playersData = snap.val();
                if(!playersData) return;
                Object.keys(playersData).forEach(id => {
                    if (!onlinePlayers[id]) onlinePlayers[id] = {};
                    onlinePlayers[id].x = playersData[id].x;
                    onlinePlayers[id].y = playersData[id].y;
                    onlinePlayers[id].team = playersData[id].team;
                    onlinePlayers[id].name = playersData[id].name;
                    onlinePlayers[id].isKick = !!playersData[id].isKick;
                });

                const list = document.getElementById('player-list'); 
                if(list && document.getElementById('lobby-panel').style.display === 'block') {
                    list.innerHTML = '';
                    Object.values(onlinePlayers).forEach(p => {
                        if(p.name) {
                            let li = document.createElement('li'); li.innerText = `⚽ ${p.name} [${p.team}]`;
                            list.appendChild(li);
                        }
                    });
                }
                if(isHost && Object.keys(onlinePlayers).length >= 2) document.getElementById('start-online-btn').style.display = 'inline-block';
            });

            db.ref(`rooms/${myRoomId}/score`).on('value', snap => {
                const scoreData = snap.val();
                if(!scoreData) return;
                score = scoreData;
                document.getElementById('score-t1').innerText = score.team1;
                document.getElementById('score-t2').innerText = score.team2;
                
                if(score.team1 + score.team2 !== lastTotalScore) {
                    lastTotalScore = score.team1 + score.team2;
                    playSound('sfx14_torcida_gol'); 
                    if(isHost) { localPlayerX = 250; localPlayerY = 310; } else { localPlayerX = 770; localPlayerY = 310; }
                }
            });

            db.ref(`rooms/${myRoomId}/timer`).on('value', snap => {
                const t = snap.val();
                if(t === null || t === undefined) return;
                let m = Math.floor(t/60).toString().padStart(2,'0');
                let s = (t%60).toString().padStart(2,'0');
                document.getElementById('game-timer').innerText = `${m}:${s}`;
            });

            db.ref(`rooms/${myRoomId}/ball`).on('value', snap => {
                const ballData = snap.val();
                if(!ballData || isHost || !ball) return; 
                ball.x = ballData.x; 
                ball.y = ballData.y; 
                ball.vx = ballData.vx || 0;
                ball.vy = ballData.vy || 0;
            });

            db.ref(`rooms/${myRoomId}/goalkeepers`).on('value', snap => {
                const gkData = snap.val();
                if(!gkData || isHost) return;
                if(goalkeepers[0] && gkData.gk1) { goalkeepers[0].x = gkData.gk1.x; goalkeepers[0].y = gkData.gk1.y; }
                if(goalkeepers[1] && gkData.gk2) { goalkeepers[1].x = gkData.gk2.x; goalkeepers[1].y = gkData.gk2.y; }
            });
        }

        function startOnlineGame() { db.ref('rooms/' + myRoomId).update({ status: 'playing' }); }
        function leaveRoom() { window.location.reload(); }

        // ==========================================
        // 5. SIMULAÇÃO FÍSICA & GAMEPLAY
        // ==========================================
        function setLocalMode(mode) { gameMode = mode; isOnline = false; showPanel('char-select'); renderTeamsMenu(); }

        function renderTeamsMenu() {
            const grid = document.getElementById('teams-grid'); grid.innerHTML = '';
            pickingStage = 1;
            document.getElementById('select-turn').innerText = isOnline ? "Sua Seleção Mobile" : "P1: Escolha a Seleção";

            Object.keys(TEAMS).forEach(team => {
                let b = document.createElement('button'); b.className = 'team-btn'; b.innerText = team;
                b.onclick = () => {
                    playSound('sfx21_select');
                    if (!isOnline) {
                        if(pickingStage === 1) {
                            selectedTeam1 = team; b.classList.add('selected'); b.disabled = true;
                            pickingStage = 2; document.getElementById('select-turn').innerText = "P2: Escolha a Seleção";
                        } else { selectedTeam2 = team; initGameEngine(false); }
                    } else {
                        if (onlineAction === 'create') executeCreateRoom(team);
                        else if (onlineAction === 'join') executeJoinRoom(targetRoomCode, team);
                    }
                };
                grid.appendChild(b);
            });
        }

        class Fan {
            constructor(x, y, teamColors) {
                this.x = x; this.y = y; this.baseY = y;
                this.color = Math.random() > 0.5 ? teamColors[0] : teamColors[1];
                this.offset = Math.random() * 5;
            }
            update() { this.y = this.baseY - Math.abs(Math.sin(Date.now() * 0.006 + this.offset)) * 4; }
            draw() { ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 5, 5); }
        }

        function createGrandstand(t1, t2) {
            crowdFans = [];
            for(let i=0; i<150; i++) crowdFans.push(new Fan(30 + Math.random()*960, 8 + Math.random()*28, t1));
            for(let i=0; i<150; i++) crowdFans.push(new Fan(30 + Math.random()*960, 584 + Math.random()*28, t2));
        }

        class Ball {
            constructor() { this.x = 510; this.y = 310; this.radius = 11; this.vx = 0; this.vy = 0; this.friction = 0.98; }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;
                
                if (this.y < 230 || this.y > 390) {
                    if (this.x - this.radius < 60) { this.x = 60 + this.radius; this.vx *= -1; playSound('sfx5_trave'); }
                    if (this.x + this.radius > 960) { this.x = 960 - this.radius; this.vx *= -1; playSound('sfx5_trave'); }
                } else {
                    if (!isOnline || isHost) {
                        if (this.x < 45) triggerGoal(2); if (this.x > 975) triggerGoal(1);
                    }
                }
                if (this.y - this.radius < 50) { this.y = 50 + this.radius; this.vy *= -1; }
                if (this.y + this.radius > 570) { this.y = 570 - this.radius; this.vy *= -1; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        class Player {
            constructor(x, y, team, id, keys) { this.x = x; this.y = y; this.radius = 18; this.team = team; this.id = id; this.keys = keys; }
            update() {
                let mx = 0, my = 0, kick = false;
                
                // P1 sempre aceita comandos virtuais/joystick no mobile
                if (this.id === "P1" && (joystick.active || isMobileKicking)) {
                    mx = joystick.x; my = joystick.y; kick = !!isMobileKicking;
                    this.x += mx * 5.0; this.y += my * 5.0;
                } else {
                    if (keysPressed[this.keys.up]) my = -1; if (keysPressed[this.keys.down]) my = 1;
                    if (keysPressed[this.keys.left]) mx = -1; if (keysPressed[this.keys.right]) mx = 1;
                    if (keysPressed[this.keys.kick]) kick = true;
                    this.x += mx * 5.0; this.y += my * 5.0;
                }

                this.x = Math.max(78, Math.min(942, this.x)); this.y = Math.max(68, Math.min(552, this.y));

                let dx = ball.x - this.x; let dy = ball.y - this.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < this.radius + ball.radius + 3) {
                    if (dist === 0) { dx = 1; dist = 1; }
                    let force = kick ? 14 : 2.5; ball.vx = (dx / dist) * force; ball.vy = (dy / dist) * force;
                    if(kick) playSound('sfx2_chute_forte');
                }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = TEAMS[this.team].main; ctx.fill(); ctx.strokeStyle = TEAMS[this.team].sub; ctx.lineWidth = 3; ctx.stroke();
            }
        }

        class Goalkeeper {
            constructor(x, y, team) { this.x = x; this.y = y; this.team = team; this.radius = 18; }
            update() {
                if (Math.random() < 0.20) return; 

                let ty = Math.max(240, Math.min(380, ball.y));
                let dy = ty - this.y; 
                if (Math.abs(dy) > 5) this.y += Math.sign(dy) * 3.0; 
                
                let dx = ball.x - this.x; 
                let dist = Math.sqrt(dx*dx + (ball.y-this.y)*(ball.y-this.y));
                if(dist < this.radius + ball.radius + 4) { 
                    ball.vx = Math.sign(dx) * -7; ball.vy = (ball.y - this.y) * 0.4; 
                    playSound('sfx13_defesa');
                }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = '#ff9900'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        // ==========================================
        // 6. MOTOR CORE & LOOPS DE SINCRO
        // ==========================================
        function initGameEngine(onlineActive) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById('hud').style.display = 'flex';
            canvas.style.display = 'block';
            
            // ATIVA COMPATIBILIDADE DE CONTROLES EM QUALQUER DISPOSITIVO
            document.getElementById('mobile-controls').style.display = 'block';

            ball = new Ball(); players = []; 
            playSound('sfx7_apito_inicio'); playMusic(1);
            
            goalkeepers = [new Goalkeeper(65, 310, "Alemanha"), new Goalkeeper(955, 310, "Brasil")];
            let t1Colors = [], t2Colors = [];

            if (!onlineActive) {
                document.getElementById('name-t1').innerText = selectedTeam1.substring(0,6).toUpperCase();
                document.getElementById('name-t2').innerText = selectedTeam2.substring(0,6).toUpperCase();
                t1Colors = [TEAMS[selectedTeam1].main, TEAMS[selectedTeam1].sub];
                t2Colors = [TEAMS[selectedTeam2].main, TEAMS[selectedTeam2].sub];

                if(gameMode === 2) {
                    players.push(new Player(250, 310, selectedTeam1, "P1", { up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', kick:'Space' }));
                    players.push(new Player(770, 310, selectedTeam2, "P2", { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', kick:'Enter' }));
                } else {
                    players.push(new Player(280, 200, selectedTeam1, "P1", { up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', kick:'Space' }));
                    players.push(new Player(280, 420, selectedTeam1, "P2", { up:'KeyI', down:'KeyK', left:'KeyJ', right:'KeyL', kick:'ShiftLeft' }));
                    players.push(new Player(740, 200, selectedTeam2, "P3", { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', kick:'Enter' }));
                    players.push(new Player(740, 420, selectedTeam2, "P4", { up:'Numpad8', down:'Numpad5', left:'Numpad4', right:'Numpad6', kick:'Numpad0' }));
                }
                createGrandstand(t1Colors, t2Colors);
                timerInterval = setInterval(updateLocalTimer, 1000);
                gameInterval = setInterval(localGameLoop, 1000 / 60);
            } else {
                let tColorsArray = Object.values(onlinePlayers).map(p => TEAMS[p.team || 'Brasil'].main);
                t1Colors = [tColorsArray[0] || '#fff', '#000']; t2Colors = [tColorsArray[1] || '#ff0', '#00f'];
                createGrandstand(t1Colors, t2Colors);

                gameInterval = setInterval(onlineGameLoop, 1000 / 60);
                if (isHost) {
                    timerInterval = setInterval(() => {
                        gameTime--; db.ref('rooms/' + myRoomId).update({ timer: gameTime });
                        if(gameTime <= 0) resolveMatchEnd();
                    }, 1000);
                }
            }
        }

        function updateLocalTimer() {
            if(gameTime > 0) {
                gameTime--;
                let m = Math.floor(gameTime/60).toString().padStart(2,'0');
                let s = (gameTime%60).toString().padStart(2,'0');
                document.getElementById('game-timer').innerText = `${m}:${s}`;
                if(gameTime === 10) playSound('sfx30_tempo_esgotando');
            } else { resolveMatchEnd(); }
        }

        function resolveMatchEnd() {
            clearInterval(timerInterval); playSound('sfx8_apito_fim');
            if(isOnline && isHost) db.ref('rooms/' + myRoomId).update({ status: 'ended' });
            else if(!isOnline) { if(score.team1 === score.team2) startPenalties(); else finishGame(); }
        }

        function finishGame() {
            clearInterval(gameInterval); clearInterval(timerInterval);
            playMusic(2); playSound('sfx38_fogos');
            alert(`Fim! Placar: ${score.team1} x ${score.team2}`);
            window.location.reload();
        }

        function startPenalties() {
            isPenaltyMode = true; document.getElementById('penalty-alert').style.display = 'block';
            setTimeout(() => document.getElementById('penalty-alert').style.display = 'none', 3000);
            setupPenaltyRound();
        }

        function setupPenaltyRound() {
            ball.vx = 0; ball.vy = 0;
            if (penaltyTurn === 1) {
                ball.x = 830; ball.y = 310; if(players[0]) { players[0].x = 790; players[0].y = 310; }
            } else {
                ball.x = 190; ball.y = 310; if(players[1]) { players[1].x = 230; players[1].y = 310; }
            }
            penaltyKicksCount++;
        }

        function triggerGoal(t) {
            playSound('sfx14_torcida_gol'); playSound('sfx6_rede');
            if(t === 1) score.team1++; else score.team2++;
            
            if(isOnline && isHost) {
                db.ref(`rooms/${myRoomId}/score`).set(score);
                ball.x = 510; ball.y = 310; ball.vx = 0; ball.vy = 0;
                db.ref(`rooms/${myRoomId}/ball`).set({ x: ball.x, y: ball.y, vx: 0, vy: 0 });
            } else if (!isOnline) {
                document.getElementById('score-t1').innerText = score.team1;
                document.getElementById('score-t2').innerText = score.team2;
                if(isPenaltyMode) {
                    penaltyTurn = penaltyTurn === 1 ? 2 : 1;
                    if(penaltyKicksCount >= 10 && score.team1 !== score.team2) finishGame();
                    else setupPenaltyRound();
                } else { ball.x = 510; ball.y = 310; ball.vx = 0; ball.vy = 0; }
            }
        }

        function drawField() {
            ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,1020,620);
            crowdFans.forEach(f => { f.update(); f.draw(); });

            ctx.fillStyle = '#1e7b1e'; ctx.fillRect(0, 50, 1020, 520);
            ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 4;
            ctx.strokeRect(60, 50, 900, 520);
            ctx.beginPath(); ctx.moveTo(510, 50); ctx.lineTo(510, 570); ctx.stroke();
            ctx.beginPath(); ctx.arc(510, 310, 70, 0, Math.PI * 2); ctx.stroke(); 
            ctx.strokeRect(60, 170, 130, 280); ctx.strokeRect(830, 170, 130, 280);
            
            if(isOnline) {
                Object.keys(onlinePlayers).forEach(id => {
                    if(id !== myPlayerId) {
                        ctx.beginPath(); ctx.arc(onlinePlayers[id].x, onlinePlayers[id].y, 18, 0, Math.PI * 2);
                        let pTeam = onlinePlayers[id].team || 'Alemanha';
                        ctx.fillStyle = TEAMS[pTeam].main; ctx.fill(); ctx.strokeStyle = TEAMS[pTeam].sub; ctx.lineWidth = 3; ctx.stroke();
                    }
                });
                ctx.beginPath(); ctx.arc(localPlayerX, localPlayerY, 18, 0, Math.PI * 2);
                let myTeam = onlinePlayers[myPlayerId]?.team || 'Brasil';
                ctx.fillStyle = TEAMS[myTeam].main; ctx.fill(); ctx.strokeStyle = TEAMS[myTeam].sub; ctx.lineWidth = 3; ctx.stroke();
            }

            if(ball) ball.draw();
            goalkeepers.forEach(g => g.draw());
        }

        function localGameLoop() { drawField(); ball.update(); players.forEach(p => { p.update(); p.draw(); }); goalkeepers.forEach(g => { g.update(); g.draw(); }); }

        function onlineGameLoop() {
            drawField(); 
            let isKick = false;
            
            if(joystick.active || isMobileKicking) {
                localPlayerX += joystick.x * 5.0; localPlayerY += joystick.y * 5.0; 
                isKick = !!isMobileKicking;
            } else {
                if (keysPressed['KeyW'] || keysPressed['ArrowUp']) localPlayerY -= 5.0;
                if (keysPressed['KeyS'] || keysPressed['ArrowDown']) localPlayerY += 5.0;
                if (keysPressed['KeyA'] || keysPressed['ArrowLeft']) localPlayerX -= 5.0;
                if (keysPressed['KeyD'] || keysPressed['ArrowRight']) localPlayerX += 5.0;
                isKick = !!(keysPressed['Space'] || keysPressed['Enter']);
            }
            
            localPlayerX = Math.max(78, Math.min(942, localPlayerX)); localPlayerY = Math.max(68, Math.min(552, localPlayerY));
            
            if (ball) {
                if (isHost) {
                    ball.update(); 
                    
                    Object.keys(onlinePlayers).forEach(id => {
                        let px = onlinePlayers[id].x; let py = onlinePlayers[id].y; let pKick = !!onlinePlayers[id].isKick;

                        if (id === myPlayerId) { px = localPlayerX; py = localPlayerY; pKick = isKick; }

                        let dx = ball.x - px; let dy = ball.y - py; let d = Math.sqrt(dx*dx + dy*dy);
                        
                        if (d < 36) {
                            if (d === 0) { dx = 1; d = 1; } 
                            let f = pKick ? 14 : 2.5;
                            ball.vx = (dx / d) * f; ball.vy = (dy / d) * f;
                            if(pKick) playSound('sfx2_chute_forte');
                        }
                    });
                    goalkeepers.forEach(g => g.update());
                } else {
                    ball.update(); 
                }
            }
            
            networkTick++;
            if (networkTick % 2 === 0 && myRoomId) {
                db.ref(`rooms/${myRoomId}/players/${myPlayerId}`).update({
                    x: localPlayerX,
                    y: localPlayerY,
                    isKick: isKick
                });

                if(isHost && ball) {
                    db.ref(`rooms/${myRoomId}/ball`).set({ x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy });
                    db.ref(`rooms/${myRoomId}/goalkeepers`).set({
                        gk1: { x: goalkeepers[0].x, y: goalkeepers[0].y },
                        gk2: { x: goalkeepers[1].x, y: goalkeepers[1].y }
                    });
                }
            }
        }
    </script>
</body>
