<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Soccer: Ultimate Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; }
        body { background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; }
        
        .panel { background: rgba(15, 15, 15, 0.95); border: 3px solid #00ff66; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); max-width: 650px; width: 92%; display: none; z-index: 20; }
        .active { display: block; }
        
        h1 { color: #00ff66; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 28px; text-shadow: 0 0 10px rgba(0,255,102,0.3); }
        h2 { font-size: 18px; margin-bottom: 20px; color: #ddd; }
        
        input { padding: 12px; font-size: 18px; text-align: center; border-radius: 6px; border: 2px solid #444; background: #222; color: #fff; margin-bottom: 15px; width: 85%; text-transform: uppercase; }
        .btn { background: #00ff66; color: #000; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 8px; transition: all 0.3s ease; text-transform: uppercase; width: 85%; }
        .btn:hover { background: #fff; transform: scale(1.02); box-shadow: 0 0 15px #00ff66; }
        .btn-secondary { background: #444; color: #fff; border: 2px solid #666; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; max-height: 240px; overflow-y: auto; padding-right: 5px; }
        .team-btn { background: #222; color: white; border: 2px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .team-btn:hover { border-color: #fff; background: #333; }
        .team-btn.selected { border-color: #00ff66; background: #111; box-shadow: 0 0 12px rgba(0,255,102,0.6); }
        
        canvas { background: #1a1a1a; border: 5px solid #333; border-radius: 12px; display: none; box-shadow: 0 15px 45px rgba(0,0,0,0.6); max-width: 100vw; max-height: 60vh; }
        #hud { display: none; width: 100%; max-width: 1020px; justify-content: space-between; background: #050505; padding: 15px 25px; border-radius: 12px 12px 0 0; border: 5px solid #333; border-bottom: none; font-size: 24px; font-weight: bold; font-family: 'Courier New', monospace; }
        .score-box { display: flex; align-items: center; gap: 15px; }
        
        #player-list { text-align: left; background: #222; padding: 12px; border-radius: 8px; margin-bottom: 15px; max-height: 180px; overflow-y: auto; }
        #player-list li { list-style: none; padding: 6px 0; border-bottom: 1px solid #444; font-size: 15px; }
        .gamepad-info { font-size: 12px; color: #aaa; margin-top: 15px; background: #222; padding: 8px; border-radius: 6px; border: 1px solid #444; }
        #penalty-alert { position: absolute; font-size: 38px; color: #ff3333; font-weight: bold; text-transform: uppercase; display: none; text-shadow: 0 0 20px #ff0000; text-align: center; z-index: 40; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; border: 2px solid #ff3333; }

        #mobile-controls { display: none; position: absolute; bottom: 10px; left: 0; width: 100%; height: 140px; pointer-events: none; z-index: 30; }
        #joystick-container { position: absolute; bottom: 15px; left: 25px; width: 100px; height: 100px; background: rgba(255, 255, 255, 0.1); border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        #joystick-handle { width: 45px; height: 45px; background: rgba(0, 255, 102, 0.6); border-radius: 50%; position: absolute; left: 25px; top: 25px; }
        #kick-btn { position: absolute; bottom: 25px; right: 25px; width: 80px; height: 80px; background: rgba(255, 51, 51, 0.8); border: 4px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        .grid::-webkit-scrollbar, #player-list::-webkit-scrollbar { width: 6px; }
        .grid::-webkit-scrollbar-track, #player-list::-webkit-scrollbar-track { background: #111; }
        .grid::-webkit-scrollbar-thumb, #player-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="penalty-alert">DISPUTA DE PÊNALTIS!<br><span style="font-size:18px; color:#fff">Série de 5 cobranças alternadas</span></div>

    <div id="menu" class="panel active">
        <h1>Pro Soccer: Cup</h1>
        <h2>Escolha o Modo de Jogo</h2>
        <button class="btn" onclick="setLocalMode(2)">Local: 1 vs 1</button>
        <button class="btn" onclick="setLocalMode(4)">Local: 2 vs 2</button>
        <button class="btn btn-secondary" onclick="showPanel('multiplayer-menu')">🌐 Multijogador Online</button>
        <div class="gamepad-info" id="controller-status">Controles USB, Teclado e Toque ativos.</div>
    </div>

    <div id="multiplayer-menu" class="panel">
        <h1>Salas Online</h1>
        <button class="btn" onclick="startOnlineCreateFlow()">Criar Nova Sala</button>
        <hr style="border-color: #333; margin: 15px 0;">
        <input type="text" id="room-code-input" placeholder="CÓDIGO DA SALA (6 DÍGITOS)" maxlength="6">
        <button class="btn" onclick="startOnlineJoinFlow()">Entrar na Sala</button>
        <button class="btn btn-secondary" onclick="showPanel('menu')">Voltar</button>
    </div>

    <div id="lobby-panel" class="panel">
        <h1>SALA: <span id="display-room-code" style="color: #00ff66;"></span></h1>
        <h2>Jogadores na Sala (Máximo 5)</h2>
        <ul id="player-list"></ul>
        <button id="start-online-btn" class="btn" onclick="startOnlineGame()" style="display:none;">Iniciar Partida</button>
        <button class="btn btn-secondary" onclick="leaveRoom()">Sair da Sala</button>
    </div>

    <div id="char-select" class="panel">
        <h1>Escolha sua Seleção</h1>
        <div id="select-turn" style="margin-bottom: 15px; font-weight: bold; color: #00ff66;"></div>
        <div class="grid" id="teams-grid"></div>
    </div>

    <div id="hud">
        <div class="score-box"><span id="name-t1">TIME A</span> <span id="score-t1" style="color:#00ff66">0</span></div>
        <div style="color: #fff; font-size: 24px;" id="game-timer">02:00</div>
        <div class="score-box"><span id="score-t2" style="color:#ff3333">0</span> <span id="name-t2">TIME B</span></div>
    </div>
    <canvas id="gameCanvas" width="1020" height="620"></canvas>

    <div id="mobile-controls">
        <div id="joystick-container"><div id="joystick-handle"></div></div>
        <div id="kick-btn">CHUTE</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCHw9gH8El6UKSEgG8zorVraL5zWeTLSQM",
            authDomain: "mmmmm-6cd19.firebaseapp.com",
            databaseURL: "https://mmmmm-6cd19-default-rtdb.firebaseio.com",
            projectId: "mmmmm-6cd19",
            storageBucket: "mmmmm-6cd19.firebasestorage.app",
            messagingSenderId: "371990311720",
            appId: "1:371990311720:web:63e3747f3239834c58561d",
            measurementId: "G-C492EPGKBE"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TEAMS = {
            'Alemanha': { main: '#ffffff', sub: '#000000', text: '#000' },
            'Brasil': { main: '#ccff00', sub: '#0052b4', text: '#000' },
            'Argentina': { main: '#74acdf', sub: '#ffffff', text: '#000' },
            'França': { main: '#002395', sub: '#ffffff', text: '#fff' },
            'Inglaterra': { main: '#ffffff', sub: '#ce1126', text: '#000' },
            'Holanda': { main: '#f36c21', sub: '#000000', text: '#000' },
            'Canadá': { main: '#ff0000', sub: '#ffffff', text: '#fff' },
            'China': { main: '#ee1c25', sub: '#ffff00', text: '#fff' },
            'Dinamarca': { main: '#c60c30', sub: '#ffffff', text: '#fff' },
            'Escócia': { main: '#005eb8', sub: '#ffffff', text: '#fff' },
            'Estados Unidos da América': { main: '#002868', sub: '#bf0a30', text: '#fff' }
        };

        let isOnline = false, isHost = false, myRoomId = null;
        let myPlayerId = "plr_" + Math.floor(Math.random() * 10000);
        let onlinePlayers = {}, onlineAction = null, targetRoomCode = null;
        
        let localPlayerX = 0, localPlayerY = 0;
        let lastTotalScore = 0;
        let networkTick = 0;

        let gameMode = 2; 
        let selectedTeam1 = "Brasil", selectedTeam2 = "Alemanha";
        let pickingStage = 1, score = { team1: 0, team2: 0 };
        let gameInterval, timerInterval, gameTime = 90;
        let players = [], goalkeepers = [], ball = null;

        let isPenaltyMode = false, penaltyTurn = 1, penaltyKicksCount = 0;
        let joystick = { x: 0, y: 0, active: false }, isMobileKicking = false;
        let isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        if(isTouchDevice) {
            const jContainer = document.getElementById('joystick-container');
            const jHandle = document.getElementById('joystick-handle');
            const kBtn = document.getElementById('kick-btn');

            jContainer.addEventListener('touchstart', (e) => { joystick.active = true; moveJoystick(e); }, {passive:false});
            window.addEventListener('touchmove', (e) => { if(joystick.active) moveJoystick(e); }, {passive:false});
            window.addEventListener('touchend', () => {
                joystick.active = false; joystick.x = 0; joystick.y = 0;
                jHandle.style.left = '25px'; jHandle.style.top = '25px';
            });
            kBtn.addEventListener('touchstart', () => { isMobileKicking = true; });
            kBtn.addEventListener('touchend', () => { isMobileKicking = false; });
        }

        function moveJoystick(e) {
            e.preventDefault();
            const jContainer = document.getElementById('joystick-container');
            const jHandle = document.getElementById('joystick-handle');
            const touch = Array.from(e.touches).find(t => t.target === jContainer || jContainer.contains(t.target));
            if(!touch) return;

            const rect = jContainer.getBoundingClientRect();
            const cx = rect.left + rect.width/2; const cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx; let dy = touch.clientY - cy;
            const dist = Math.min(rect.width/2, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);

            joystick.x = (Math.cos(angle) * dist) / (rect.width/2);
            joystick.y = (Math.sin(angle) * dist) / (rect.height/2);
            jHandle.style.left = `${(rect.width/2) + Math.cos(angle)*dist - 22}px`;
            jHandle.style.top = `${(rect.height/2) + Math.sin(angle)*dist - 22}px`;
        }

        function startOnlineCreateFlow() { onlineAction = 'create'; isOnline = true; showPanel('char-select'); renderTeamsMenu(); }
        function startOnlineJoinFlow() {
            const code = document.getElementById('room-code-input').value.toUpperCase();
            if(code.length < 5) return alert("Código Inválido.");

            db.ref('rooms/' + code).once('value', snap => {
                if(snap.exists()) {
                    const data = snap.val();
                    const count = Object.keys(data.players || {}).length;
                    if(count >= 5) return alert("Sala lotada (Máx 5).");
                    if(data.status === 'playing') return alert("A partida já começou.");
                    
                    onlineAction = 'join'; targetRoomCode = code; isOnline = true;
                    showPanel('char-select'); renderTeamsMenu();
                } else { alert("Sala não encontrada."); }
            });
        }

        function executeCreateRoom(team) {
            myRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            isHost = true;
            localPlayerX = 250; localPlayerY = 310;

            db.ref('rooms/' + myRoomId).set({
                status: 'waiting',
                players: { [myPlayerId]: { name: "Host (P1)", team: team, x: localPlayerX, y: localPlayerY, isKick: false } },
                ball: { x: 510, y: 310, vx: 0, vy: 0 },
                goalkeepers: { gk1: { x: 65, y: 310 }, gk2: { x: 955, y: 310 } },
                score: { team1: 0, team2: 0 },
                timer: 90
            }).then(() => {
                document.getElementById('display-room-code').innerText = myRoomId;
                showPanel('lobby-panel'); listenToRoom();
            });
        }

        function executeJoinRoom(code, team) {
            myRoomId = code; isHost = false;

            db.ref(`rooms/${code}/players`).once('value', snap => {
                const currentPlayers = snap.val() || {};
                const count = Object.keys(currentPlayers).length;
                
                const spawnPositions = [
                    {x: 770, y: 310},
                    {x: 720, y: 180},
                    {x: 720, y: 440},
                    {x: 820, y: 220}
                ];
                let selectedSpawn = spawnPositions[(count - 1) % spawnPositions.length] || {x: 770, y: 310};
                localPlayerX = selectedSpawn.x; 
                localPlayerY = selectedSpawn.y;

                db.ref(`rooms/${myRoomId}/players/${myPlayerId}`).set({
                    name: `Jogador ${count + 1}`, team: team, x: localPlayerX, y: localPlayerY, isKick: false
                }).then(() => {
                    document.getElementById('display-room-code').innerText = myRoomId;
                    showPanel('lobby-panel'); listenToRoom();
                });
            });
        }

        function listenToRoom() {
            db.ref('rooms/' + myRoomId).on('value', snap => {
                const data = snap.val(); 
                if(!data) {
                    if(canvas.style.display === 'block') {
                        clearInterval(gameInterval); clearInterval(timerInterval);
                        alert("Conexão perdida: A sala foi encerrada ou o Host desconectou.");
                        window.location.reload();
                    }
                    return;
                }
                
                if (data.players) {
                    Object.keys(data.players).forEach(id => {
                        if (!onlinePlayers[id]) onlinePlayers[id] = {};
                        if (data.players[id].x !== undefined) onlinePlayers[id].x = data.players[id].x;
                        if (data.players[id].y !== undefined) onlinePlayers[id].y = data.players[id].y;
                        if (data.players[id].team !== undefined) onlinePlayers[id].team = data.players[id].team;
                        if (data.players[id].name !== undefined) onlinePlayers[id].name = data.players[id].name;
                        if (data.players[id].isKick !== undefined) onlinePlayers[id].isKick = data.players[id].isKick;
                    });
                }

                if(data.status === 'ended') { return finishGame(); }

                const list = document.getElementById('player-list'); 
                if(list && document.getElementById('lobby-panel').style.display === 'block') {
                    list.innerHTML = '';
                    Object.values(onlinePlayers).forEach(p => {
                        if(p && p.name) {
                            let li = document.createElement('li'); li.innerText = `⚽ ${p.name} [${p.team || ''}]`;
                            list.appendChild(li);
                        }
                    });
                }

                if(isHost && Object.keys(onlinePlayers).length >= 2) document.getElementById('start-online-btn').style.display = 'inline-block';
                if(data.status === 'playing' && canvas.style.display !== 'block') initGameEngine(true);

                if(data.status === 'playing') {
                    score = data.score || {team1: 0, team2: 0};
                    document.getElementById('score-t1').innerText = score.team1;
                    document.getElementById('score-t2').innerText = score.team2;
                    
                    let currentTotalScore = score.team1 + score.team2;
                    if(currentTotalScore !== lastTotalScore) {
                        lastTotalScore = currentTotalScore;
                        if(isHost) { localPlayerX = 250; localPlayerY = 310; } 
                        else { localPlayerX = 770; localPlayerY = 310; }
                    }

                    if(data.timer !== undefined) {
                        let m = Math.floor(data.timer/60).toString().padStart(2,'0');
                        let s = (data.timer%60).toString().padStart(2,'0');
                        document.getElementById('game-timer').innerText = `${m}:${s}`;
                    }
                    
                    if(ball && !isHost && data.ball) { ball.x = data.ball.x; ball.y = data.ball.y; }
                    
                    if(!isHost && data.goalkeepers && data.goalkeepers.gk1 && data.goalkeepers.gk2) {
                        if(goalkeepers[0]) { goalkeepers[0].x = data.goalkeepers.gk1.x; goalkeepers[0].y = data.goalkeepers.gk1.y; }
                        if(goalkeepers[1]) { goalkeepers[1].x = data.goalkeepers.gk2.x; goalkeepers[1].y = data.goalkeepers.gk2.y; }
                    }
                }
            });
        }

        function startOnlineGame() { db.ref('rooms/' + myRoomId).update({ status: 'playing' }); }
        function leaveRoom() { window.location.reload(); }

        function setLocalMode(mode) { gameMode = mode; isOnline = false; showPanel('char-select'); renderTeamsMenu(); }

        function renderTeamsMenu() {
            const grid = document.getElementById('teams-grid'); grid.innerHTML = '';
            pickingStage = 1;
            document.getElementById('select-turn').innerText = isOnline ? "Escolha sua Seleção Online" : "JOGADOR 1: Escolha sua Seleção";

            Object.keys(TEAMS).forEach(team => {
                let b = document.createElement('button'); b.className = 'team-btn'; b.innerText = team;
                b.onclick = () => {
                    if (!isOnline) {
                        if(pickingStage === 1) {
                            selectedTeam1 = team; b.classList.add('selected'); b.disabled = true;
                            pickingStage = 2; document.getElementById('select-turn').innerText = "JOGADOR 2: Escolha sua Seleção";
                        } else { selectedTeam2 = team; initGameEngine(false); }
                    } else {
                        if (onlineAction === 'create') executeCreateRoom(team);
                        else if (onlineAction === 'join') executeJoinRoom(targetRoomCode, team);
                    }
                };
                grid.appendChild(b);
            });
        }

        const keysPressed = {};
        const blockedKeys = ['Space', 'KeyW', 'KeyS', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'];
        
        window.addEventListener('keydown', e => {
            if(blockedKeys.includes(e.code)) e.preventDefault(); 
            keysPressed[e.code] = true;
        });
        window.addEventListener('keyup', e => {
            if(blockedKeys.includes(e.code)) e.preventDefault();
            keysPressed[e.code] = false;
        });

        class Ball {
            constructor() { this.x = 510; this.y = 310; this.radius = 11; this.vx = 0; this.vy = 0; this.friction = 0.98; }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;
                if (this.y < 230 || this.y > 390) {
                    if (this.x - this.radius < 60) { this.x = 60 + this.radius; this.vx *= -1; }
                    if (this.x + this.radius > 960) { this.x = 960 - this.radius; this.vx *= -1; }
                } else {
                    if (!isOnline || isHost) {
                        if (this.x < 45) triggerGoal(2); if (this.x > 975) triggerGoal(1);
                    }
                }
                if (this.y - this.radius < 50) { this.y = 50 + this.radius; this.vy *= -1; }
                if (this.y + this.radius > 570) { this.y = 570 - this.radius; this.vy *= -1; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
            }
        }

        class Player {
            constructor(x, y, team, id, keys) { this.x = x; this.y = y; this.radius = 18; this.team = team; this.id = id; this.keys = keys; }
            update() {
                let mx = 0, my = 0, kick = false;
                if (keysPressed[this.keys.up]) my = -1; if (keysPressed[this.keys.down]) my = 1;
                if (keysPressed[this.keys.left]) mx = -1; if (keysPressed[this.keys.right]) mx = 1;
                if (keysPressed[this.keys.kick]) kick = true;

                this.x += mx * 4.8; this.y += my * 4.8;
                this.x = Math.max(78, Math.min(942, this.x)); this.y = Math.max(68, Math.min(552, this.y));

                let dx = ball.x - this.x; let dy = ball.y - this.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < this.radius + ball.radius + 3) {
                    let force = kick ? 14 : 2.5; ball.vx = (dx / dist) * force; ball.vy = (dy / dist) * force;
                }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = TEAMS[this.team].main; ctx.fill(); ctx.strokeStyle = TEAMS[this.team].sub; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = TEAMS[this.team].text; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(this.id, this.x, this.y);
            }
        }

        class Goalkeeper {
            constructor(x, y, team) { this.x = x; this.y = y; this.team = team; this.radius = 18; }
            update() {
                let ty = Math.max(240, Math.min(380, ball.y));
                let dy = ty - this.y; if (Math.abs(dy) > 5) this.y += Math.sign(dy) * 3.7;
                let dx = ball.x - this.x; let dist = Math.sqrt(dx*dx + (ball.y-this.y)*(ball.y-this.y));
                if(dist < this.radius + ball.radius + 4) { ball.vx = Math.sign(dx) * -7; ball.vy = (ball.y - this.y) * 0.4; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = '#ff9900'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
            }
        }

        function initGameEngine(onlineActive) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById('hud').style.display = 'flex';
            canvas.style.display = 'block';
            if(isTouchDevice) document.getElementById('mobile-controls').style.display = 'block';

            ball = new Ball(); players = []; 
            
            goalkeepers = [
                new Goalkeeper(65, 310, "Alemanha"), 
                new Goalkeeper(955, 310, "Brasil")
            ];

            if (!onlineActive) {
                document.getElementById('name-t1').innerText = selectedTeam1.toUpperCase();
                document.getElementById('name-t2').innerText = selectedTeam2.toUpperCase();
                if(gameMode === 2) {
                    players.push(new Player(250, 310, selectedTeam1, "P1", { up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', kick:'Space' }));
                    players.push(new Player(770, 310, selectedTeam2, "P2", { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', kick:'Enter' }));
                } else {
                    players.push(new Player(280, 200, selectedTeam1, "P1", { up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', kick:'Space' }));
                    players.push(new Player(280, 420, selectedTeam1, "P2", { up:'KeyI', down:'KeyK', left:'KeyJ', right:'KeyL', kick:'ShiftLeft' }));
                    players.push(new Player(740, 200, selectedTeam2, "P3", { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', kick:'Enter' }));
                    players.push(new Player(740, 420, selectedTeam2, "P4", { up:'Numpad8', down:'Numpad5', left:'Numpad4', right:'Numpad6', kick:'Numpad0' }));
                }
                timerInterval = setInterval(updateLocalTimer, 1000);
                gameInterval = setInterval(localGameLoop, 1000 / 60);
            } else {
                gameInterval = setInterval(onlineGameLoop, 1000 / 60);
                if (isHost) {
                    timerInterval = setInterval(() => {
                        gameTime--; db.ref('rooms/' + myRoomId).update({ timer: gameTime });
                        if(gameTime <= 0) resolveMatchEnd();
                    }, 1000);
                }
            }
        }

        function updateLocalTimer() {
            if(gameTime > 0) {
                gameTime--;
                let m = Math.floor(gameTime/60).toString().padStart(2,'0');
                let s = (gameTime%60).toString().padStart(2,'0');
                document.getElementById('game-timer').innerText = `${m}:${s}`;
            } else { resolveMatchEnd(); }
        }

        function resolveMatchEnd() {
            clearInterval(timerInterval);
            if(isOnline && isHost) { db.ref('rooms/' + myRoomId).update({ status: 'ended' }); }
            else if(!isOnline) { if(score.team1 === score.team2) startPenalties(); else finishGame(); }
        }

        function startPenalties() {
            isPenaltyMode = true; document.getElementById('penalty-alert').style.display = 'block';
            setTimeout(() => document.getElementById('penalty-alert').style.display = 'none', 3000);
            setupPenaltyRound();
        }

        function setupPenaltyRound() {
            ball.vx = 0; ball.vy = 0;
            if (penaltyTurn === 1) {
                ball.x = 830; ball.y = 310; if(players[0]) { players[0].x = 790; players[0].y = 310; }
            } else {
                ball.x = 190; ball.y = 310; if(players[1]) { players[1].x = 230; players[1].y = 310; }
            }
            penaltyKicksCount++;
        }

        function triggerGoal(t) {
            if(t === 1) score.team1++; else score.team2++;
            
            if(isOnline && isHost) {
                db.ref(`rooms/${myRoomId}/score`).set(score);
                ball.x = 510; ball.y = 310; ball.vx = 0; ball.vy = 0;
                db.ref(`rooms/${myRoomId}/ball`).set({ x: ball.x, y: ball.y, vx: 0, vy: 0 });
            } else if (!isOnline) {
                document.getElementById('score-t1').innerText = score.team1;
                document.getElementById('score-t2').innerText = score.team2;
                if(isPenaltyMode) {
                    penaltyTurn = penaltyTurn === 1 ? 2 : 1;
                    if(penaltyKicksCount >= 10 && score.team1 !== score.team2) finishGame();
                    else setupPenaltyRound();
                } else { ball.x = 510; ball.y = 310; ball.vx = 0; ball.vy = 0; }
            }
        }

        function drawField() {
            ctx.fillStyle = '#1e7b1e'; ctx.fillRect(0,0,1020,620);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 4;
            ctx.strokeRect(60, 50, 900, 520);
            ctx.beginPath(); ctx.moveTo(510, 50); ctx.lineTo(510, 570); ctx.stroke();
            ctx.strokeRect(60, 170, 130, 280); ctx.strokeRect(830, 170, 130, 280);
            
            // Renderiza outros jogadores online
            if(isOnline) {
                Object.keys(onlinePlayers).forEach(id => {
                    if(id !== myPlayerId && onlinePlayers[id].x !== undefined) {
                        ctx.beginPath(); ctx.arc(onlinePlayers[id].x, onlinePlayers[id].y, 18, 0, Math.PI * 2);
                        let pTeam = onlinePlayers[id].team || 'Alemanha';
                        ctx.fillStyle = TEAMS[pTeam].main; ctx.fill();
                        ctx.strokeStyle = TEAMS[pTeam].sub; ctx.lineWidth = 3; ctx.stroke();
                    }
                });
                
                // Renderiza a si mesmo na partida online
                ctx.beginPath(); ctx.arc(localPlayerX, localPlayerY, 18, 0, Math.PI * 2);
                let myTeam = (onlinePlayers[myPlayerId] && onlinePlayers[myPlayerId].team) ? onlinePlayers[myPlayerId].team : 'Brasil';
                ctx.fillStyle = TEAMS[myTeam].main; ctx.fill();
                ctx.strokeStyle = TEAMS[myTeam].sub; ctx.lineWidth = 3; ctx.stroke();
            }

            if(ball) ball.draw();
            goalkeepers.forEach(g => g.draw());
        }

        function localGameLoop() { drawField(); ball.update(); players.forEach(p => { p.update(); p.draw(); }); goalkeepers.forEach(g => { g.update(); g.draw(); }); }

       function onlineGameLoop() {
            drawField(); 
            
            let isKick = false;
            if(isTouchDevice) {
                localPlayerX += joystick.x * 4.8; localPlayerY += joystick.y * 4.8; isKick = isMobileKicking;
            } else {
                if (keysPressed['KeyW'] || keysPressed['ArrowUp']) localPlayerY -= 4.8;
                if (keysPressed['KeyS'] || keysPressed['ArrowDown']) localPlayerY += 4.8;
                if (keysPressed['KeyA'] || keysPressed['ArrowLeft']) localPlayerX -= 4.8;
                if (keysPressed['KeyD'] || keysPressed['ArrowRight']) localPlayerX += 4.8;
                isKick = (keysPressed['Space'] || keysPressed['Enter']) ? true : false;
            }
            
            localPlayerX = Math.max(78, Math.min(942, localPlayerX));
            localPlayerY = Math.max(68, Math.min(552, localPlayerY));
            
            // Força a atualização local imediata para o próprio jogador não ter delay
            if (onlinePlayers[myPlayerId]) {
                onlinePlayers[myPlayerId].x = localPlayerX;
                onlinePlayers[myPlayerId].y = localPlayerY;
                onlinePlayers[myPlayerId].isKick = isKick;
            }
            
            networkTick++;
            if (networkTick % 2 === 0 && myRoomId) {
                let updates = {};
                updates[`players/${myPlayerId}/x`] = localPlayerX;
                updates[`players/${myPlayerId}/y`] = localPlayerY;
                updates[`players/${myPlayerId}/isKick`] = isKick;

                if(isHost && ball) {
                    ball.update();
                    Object.keys(onlinePlayers).forEach(id => {
                        let p = onlinePlayers[id];
                        if (p && p.x !== undefined && p.y !== undefined) {
                            let dx = ball.x - p.x; let dy = ball.y - p.y; let d = Math.sqrt(dx*dx + dy*dy);
                            // Aumentado ligeiramente o raio de colisão online para 36 para evitar ghosting/lag
                            if(d < 36) {
                                // CORREÇÃO COMPLEXA: Detecta o chute tanto do Host quanto do Client perfeitamente
                                let f = p.isKick ? 14 : 2.5; 
                                ball.vx = (dx/d)*f; ball.vy = (dy/d)*f;
                            }
                        }
                    });
                    updates[`ball`] = { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy };

                    goalkeepers.forEach(g => g.update());
                    updates[`goalkeepers`] = {
                        gk1: { x: goalkeepers[0].x, y: goalkeepers[0].y },
                        gk2: { x: goalkeepers[1].x, y: goalkeepers[1].y }
                    };
                }
                db.ref(`rooms/${myRoomId}`).update(updates).catch(e => console.log("Erro de rede ignorado:", e));
            } else {
                if (isHost && ball) {
                    ball.update();
                    Object.keys(onlinePlayers).forEach(id => {
                        let p = onlinePlayers[id];
                        if (p && p.x !== undefined && p.y !== undefined) {
                            let dx = ball.x - p.x; let dy = ball.y - p.y; let d = Math.sqrt(dx*dx + dy*dy);
                            if(d < 36) {
                                let f = p.isKick ? 14 : 2.5; ball.vx = (dx/d)*f; ball.vy = (dy/d)*f;
                            }
                        }
                    });
                    goalkeepers.forEach(g => g.update());
                }
            }
        }

        function finishGame() {
            clearInterval(gameInterval); clearInterval(timerInterval);
            alert(`Fim de jogo!\nPlacar: ${score.team1} x ${score.team2}`);
            window.location.reload();
        }
    </script>
</body>
